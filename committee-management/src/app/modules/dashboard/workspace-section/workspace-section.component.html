<section>
  <div>
    <div class="mb-4 rounded-xl border border-slate-200 bg-white p-4 shadow-lg transition-all">
      <h3 class="text-xl font-bold text-slate-900">{{ title }}</h3>
      <p class="text-sm text-slate-500">{{ subtitle }}</p>
    </div>

    <div class="rounded-xl border border-slate-200 bg-white p-4 shadow-lg transition-all">
      <div class="mb-4 flex flex-wrap items-center justify-between gap-2">
        <h6 class="text-sm font-semibold text-slate-700">Live Records</h6>
      </div>

      <ng-container *ngIf="rows.length > 0; else workspaceEmptyState">
        <div class="overflow-x-auto">
          <table class="min-w-full text-sm">
            <thead>
              <tr class="border-b border-slate-200 text-left text-xs uppercase tracking-wide text-slate-500">
                <th class="px-3 py-2">Item</th>
                <th class="px-3 py-2">Owner</th>
                <th class="px-3 py-2">Status</th>
                <th class="px-3 py-2">Updated</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let row of rows" class="border-b border-slate-100 text-slate-700">
                <td class="px-3 py-2">{{ row.item }}</td>
                <td class="px-3 py-2">{{ row.owner }}</td>
                <td class="px-3 py-2"><span class="rounded-xl bg-blue-100 px-2 py-1 text-xs font-semibold text-blue-700">{{ row.status }}</span></td>
                <td class="px-3 py-2">{{ row.updatedAt }}</td>
              </tr>
            </tbody>
          </table>
        </div>
      </ng-container>

      <ng-template #workspaceEmptyState>
        <app-empty-state
          icon="inbox"
          title="No records available"
          subtitle="Records will appear here when backend data is available"
        ></app-empty-state>
      </ng-template>
    </div>
  </div>
</section>
