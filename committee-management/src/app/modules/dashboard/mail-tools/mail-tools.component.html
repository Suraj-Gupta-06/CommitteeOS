<section class="space-y-6">
  <div class="space-y-6">
    <div class="rounded-xl border border-slate-200 bg-white p-4 shadow-lg transition-all">
      <h2 class="page-header-title">Password Reset Utility</h2>
      <p class="page-header-subtitle">Admin-only tool for STUDENT/FACULTY forgot-password handling.</p>
    </div>

    <div class="rounded-xl border border-slate-200 bg-white p-5 shadow-lg hover:shadow-xl transition-all">
      <h4 class="panel-title mb-3">Reset Forgotten Password</h4>
      <p class="mb-3 text-xs text-slate-500">Set a new password for a STUDENT or FACULTY account and send a reset notification email.</p>

      <div class="space-y-3">
        <select
          #roleInput
          [value]="selectedRole"
          (change)="selectedRole = $any(roleInput.value)"
          class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all">
          <option *ngFor="let role of supportedRoles" [value]="role">{{ role }}</option>
        </select>

        <input #emailInput type="email" placeholder="student.or.faculty@example.com" class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all" />

        <input #newPasswordInput type="password" placeholder="Enter new password" class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all" />

        <input #confirmPasswordInput type="password" placeholder="Confirm new password" class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all" />

        <button
          (click)="processForgotPasswordReset(emailInput.value, roleInput.value, newPasswordInput.value, confirmPasswordInput.value)"
          [disabled]="loading"
          class="w-full rounded-xl bg-blue-600 px-4 py-2 text-sm font-semibold text-white shadow-lg hover:bg-blue-700 hover:shadow-xl transition-all disabled:opacity-60">
          {{ loading ? 'Processing...' : 'Reset Password (Forgot Password)' }}
        </button>

        <p *ngIf="message" class="text-xs" [class.text-emerald-600]="success" [class.text-amber-600]="!success">
          {{ message }}
        </p>
      </div>
    </div>
  </div>
</section>
