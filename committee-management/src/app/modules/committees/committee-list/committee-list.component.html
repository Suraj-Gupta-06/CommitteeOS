<section class="w-full space-y-4">
	<div class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">
		<h2 class="page-header-title">Committees</h2>
		<p class="page-header-subtitle">Explore committee ownership, faculty in-charge details, and role context.</p>
	</div>

	<div *ngIf="isLoading" class="grid gap-4 md:grid-cols-2" aria-live="polite">
		<article *ngFor="let skeleton of [1, 2]" class="animate-pulse rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">
			<div class="h-5 w-2/3 rounded bg-slate-200"></div>
			<div class="mt-2 h-3 w-1/2 rounded bg-slate-200"></div>
			<div class="mt-4 h-3 w-full rounded bg-slate-200"></div>
			<div class="mt-2 h-3 w-5/6 rounded bg-slate-200"></div>
			<div class="mt-4 h-9 w-28 rounded-xl bg-slate-200"></div>
		</article>
	</div>

	<div *ngIf="errorMessage" class="rounded-2xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm font-medium text-rose-700">
		{{ errorMessage }}
	</div>

	<div *ngIf="!isLoading && !errorMessage">
		<ng-container *ngIf="committees.length > 0; else emptyCommitteesState">
			<div class="grid gap-4 md:grid-cols-2">
				<article *ngFor="let committee of committees" class="committee-card rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">
					<div class="flex items-start justify-between gap-3">
						<div class="min-w-0">
							<h3 class="mb-1 truncate text-xl font-semibold text-slate-800">{{ committee.committeeName }}</h3>
							<p class="mb-0 text-sm font-medium text-slate-500">{{ committee.facultyInchargeName || 'Faculty not assigned' }}</p>
						</div>

						<span class="inline-flex items-center rounded-full bg-blue-50 px-2.5 py-1 text-[11px] font-semibold uppercase tracking-[0.12em] text-blue-700">
							Committee
						</span>
					</div>

					<p class="mb-0 mt-3 text-sm leading-relaxed text-slate-600">{{ getCommitteeDescription(committee) }}</p>

					<div class="mt-4">
						<a
							*ngIf="getCommitteeRouteId(committee) as routeId; else unavailableDetails"
							class="inline-flex items-center rounded-xl border border-blue-300 bg-blue-50 px-3 py-2 text-sm font-semibold text-blue-700 no-underline transition-all hover:-translate-y-0.5 hover:bg-blue-100 hover:text-blue-800"
							[routerLink]="[routeId]"
						>
							View Details
						</a>

						<ng-template #unavailableDetails>
							<span class="inline-flex items-center rounded-xl border border-slate-300 bg-slate-50 px-3 py-2 text-sm font-semibold text-slate-500">
								Details Unavailable
							</span>
						</ng-template>
					</div>
				</article>
			</div>
		</ng-container>

		<ng-template #emptyCommitteesState>
			<app-empty-state
				icon="groups"
				title="No committees yet"
				subtitle="You are not assigned to any committee yet. Check back after you are added by a faculty lead."
				actionLabel="Back to Dashboard"
				actionRoute="/dashboard"
			></app-empty-state>
		</ng-template>
	</div>
</section>
