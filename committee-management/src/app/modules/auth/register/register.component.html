<section class="flex min-h-[70vh] items-center justify-center px-4">
  <div class="w-full max-w-lg rounded-xl border border-slate-200 bg-white p-6 shadow-lg hover:shadow-xl transition-all">
    <div class="mb-5 text-center">
      <h3 class="text-2xl font-bold text-slate-900">Create Your Account</h3>
      <p class="text-sm text-slate-500">Register and access your committee workspace</p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" novalidate class="space-y-4">
      <div>
        <label class="mb-1 block text-sm font-medium text-slate-700">Full Name</label>
        <input formControlName="name" placeholder="Enter full name" class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all" />
      </div>

      <div>
        <label class="mb-1 block text-sm font-medium text-slate-700">Email</label>
        <input type="email" formControlName="email" placeholder="example@college.edu" class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all" />
      </div>

      <div>
        <label class="mb-1 block text-sm font-medium text-slate-700">Password</label>
        <input type="password" formControlName="password" placeholder="Create password" class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all" />
      </div>

      <div>
        <label class="mb-1 block text-sm font-medium text-slate-700">Role</label>
        <select formControlName="role" class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all">
          <option value="FACULTY">FACULTY</option>
          <option value="STUDENT">STUDENT</option>
        </select>
      </div>

      <p *ngIf="message" class="text-xs" [class.text-emerald-600]="message.includes('successful')" [class.text-red-600]="!message.includes('successful')">{{ message }}</p>
      <p *ngIf="helpText" class="text-xs text-amber-700">{{ helpText }}</p>

      <button type="submit" [disabled]="submitting" class="w-full rounded-xl bg-blue-600 px-4 py-2 text-sm font-semibold text-white shadow-lg hover:bg-blue-700 hover:shadow-xl transition-all">
        {{ submitting ? 'Creating account...' : 'Create Account' }}
      </button>
    </form>

    <div class="mt-4 text-center text-sm text-slate-500">
      Already have an account?
      <a routerLink="/auth/login" class="font-medium text-blue-600 hover:text-blue-700 transition-all">Login</a>
    </div>
  </div>
</section>
