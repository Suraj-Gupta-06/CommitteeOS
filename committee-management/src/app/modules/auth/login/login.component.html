<section class="flex min-h-[70vh] items-center justify-center px-4">
  <div class="w-full max-w-md rounded-xl border border-slate-200 bg-white p-6 shadow-lg hover:shadow-xl transition-all">
    <div class="mb-5 text-center">
      <h3 class="text-2xl font-bold text-slate-900">Welcome Back</h3>
      <p class="text-sm text-slate-500">Login to continue to your role dashboard</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate class="space-y-4">
      <div>
        <label class="mb-1 block text-sm font-medium text-slate-700">Email</label>
        <input type="email" formControlName="email" placeholder="example@college.edu" class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all" />
        <small class="mt-1 block text-xs text-red-600" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid">Valid email is required.</small>
      </div>

      <div>
        <label class="mb-1 block text-sm font-medium text-slate-700">Password</label>
        <input type="password" formControlName="password" placeholder="Enter password" class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all" />
        <small class="mt-1 block text-xs text-red-600" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">Password must be at least 6 characters.</small>
      </div>

      <p *ngIf="errorMessage" class="text-xs text-red-600">{{ errorMessage }}</p>

      <button type="submit" [disabled]="loading" class="w-full rounded-xl bg-blue-600 px-4 py-2 text-sm font-semibold text-white shadow-lg hover:bg-blue-700 hover:shadow-xl transition-all">
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>

    <div class="mt-4 text-center text-sm text-slate-500">
      New here?
      <a routerLink="/auth/register" class="font-medium text-blue-600 hover:text-blue-700 transition-all">Create account</a>
    </div>
  </div>
</section>
