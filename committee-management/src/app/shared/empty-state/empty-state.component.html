<div class="rounded-2xl border border-slate-200 bg-white px-4 py-10 text-center shadow-sm">
  <span class="mx-auto inline-flex h-12 w-12 items-center justify-center rounded-full bg-slate-100 text-slate-600">
    <span class="material-icons text-[22px]">{{ icon }}</span>
  </span>

  <h4 class="mt-4 text-base font-semibold text-slate-800">{{ title }}</h4>
  <p class="mx-auto mt-1 max-w-lg text-sm text-slate-500">{{ subtitle }}</p>

  <a
    *ngIf="actionLabel && actionRoute"
    [routerLink]="actionRoute"
    class="mt-4 inline-flex items-center rounded-xl border border-blue-300 bg-blue-50 px-3 py-2 text-sm font-semibold text-blue-700 no-underline transition-all hover:-translate-y-0.5 hover:bg-blue-100 hover:text-blue-800"
  >
    {{ actionLabel }}
  </a>
</div>
