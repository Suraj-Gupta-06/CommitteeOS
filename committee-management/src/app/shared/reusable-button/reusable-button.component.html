<button
	[type]="type"
	class="inline-flex items-center justify-center rounded-xl px-4 py-2 text-sm font-semibold shadow-sm transition-all duration-200 hover:scale-[1.02] hover:shadow-md disabled:cursor-not-allowed disabled:opacity-60 disabled:hover:scale-100"
	[class.w-full]="fullWidth"
	[ngClass]="buttonClass"
	[disabled]="disabled"
	(click)="onClick()"
>
	{{ label }}
</button>
