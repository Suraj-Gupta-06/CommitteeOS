<article class="rounded-xl border border-slate-200 bg-slate-50 p-4 transition-all duration-300 hover:bg-white hover:shadow-md">
  <div class="flex items-center justify-between gap-3">
    <h4 class="text-sm font-bold text-slate-800">{{ title }}</h4>
    <span class="text-sm font-extrabold text-indigo-700">{{ valueLabel }}</span>
  </div>

  <p *ngIf="description" class="mt-2 text-xs text-slate-500">{{ description }}</p>

  <div class="mt-3 h-2 rounded-full bg-slate-200">
    <span class="block h-full rounded-full bg-indigo-600 transition-all duration-300" [style.width]="clampedPercentage + '%'" aria-hidden="true"></span>
  </div>
</article>
