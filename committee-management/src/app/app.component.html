<div class="min-h-screen overflow-x-hidden" [ngClass]="useImmersiveStudentProfileLayout ? 'p-0' : (isLandingRoute ? 'bg-[#f8fafc]' : 'bg-slate-100')">
  <app-header
    *ngIf="!useImmersiveStudentProfileLayout"
    [appName]="appName"
    [hasSidebarOffset]="showRoleWorkspace"
  ></app-header>

  <main *ngIf="useImmersiveStudentProfileLayout" class="w-full min-h-screen">
    <router-outlet></router-outlet>
  </main>

  <ng-container *ngIf="!useImmersiveStudentProfileLayout">
    <app-role-workspace *ngIf="showRoleWorkspace"></app-role-workspace>

    <div class="flex min-h-screen w-full">
      <div *ngIf="showRoleWorkspace" class="hidden w-64 shrink-0 md:block"></div>

      <div class="min-w-0 flex-1">
        <main [ngClass]="isLandingRoute ? 'w-full min-h-screen pt-[72px]' : 'w-full min-h-screen p-6 pt-32 md:p-8 md:pt-32 lg:pt-24'">
          <router-outlet></router-outlet>
        </main>

        <div [ngClass]="isLandingRoute ? 'pb-4' : 'px-6 pb-6 md:px-8 md:pb-8'">
          <app-footer [year]="currentYear"></app-footer>
        </div>
      </div>
    </div>
  </ng-container>
</div>
